services:
  ai-service:
    build:
      context: ./ai-service

    container_name: ai-service

    ports:
      - "8000:8000"

    env_file:
      - ./ai-service/.env

    volumes:
      - ./ai-service:/app
      - ./ai-service/chroma_db:/app/chroma_db

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

    restart: unless-stopped

  juice-shop:
    build:
      context: ./juice-shop

    container_name: juice-shop

    environment:
      AI_SERVICE_URL: http://ai-service:8000/rest/chat

    ports:
      - "3001:3000"

    restart: unless-stopped
