name: Publish Docker Images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  publish:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Convert Repository Owner to Lowercase
        run: |
          echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      ##################################################
      # AI SERVICE
      ##################################################

      - name: Build AI Service Image
        run: |
          docker build \
            -t ghcr.io/${OWNER_LC}/ai-service:latest \
            -t ghcr.io/${OWNER_LC}/ai-service:${{ github.sha }} \
            ./ai-service

      - name: Push AI Service Image
        run: |
          docker push ghcr.io/${OWNER_LC}/ai-service:latest
          docker push ghcr.io/${OWNER_LC}/ai-service:${{ github.sha }}

      ##################################################
      # JUICE SHOP
      ##################################################

      - name: Build Juice Shop Image
        run: |
          docker build \
            -t ghcr.io/${OWNER_LC}/juice-shop:latest \
            -t ghcr.io/${OWNER_LC}/juice-shop:${{ github.sha }} \
            ./juice-shop

      - name: Push Juice Shop Image
        run: |
          docker push ghcr.io/${OWNER_LC}/juice-shop:latest
          docker push ghcr.io/${OWNER_LC}/juice-shop:${{ github.sha }}