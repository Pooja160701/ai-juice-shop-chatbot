name: AI Juice Shop CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  backend:

    name: FastAPI Backend

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ai-service

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify FastAPI Imports
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JUICE_SHOP_API: https://demo.owasp-juice.shop/api/Products
          CHROMA_PATH: ./chroma_db
          PYTHONPATH: .
        run: |
          python -c "import app.main"

      - name: Verify Routes
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JUICE_SHOP_API: https://demo.owasp-juice.shop/api/Products
          CHROMA_PATH: ./chroma_db
          PYTHONPATH: .
        run: |
          python -c "from app.main import app; print(len(app.routes))"

  juice-shop:

    name: Juice Shop Build

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: juice-shop

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Dependencies
        run: npm install --no-audit --no-fund
        
      - name: Build Juice Shop
        run: npm run build

  docker:

    name: Docker Validation

    runs-on: ubuntu-latest

    needs:
      - backend
      - juice-shop

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build AI Service Image
        run: docker compose build ai-service

      - name: Build Juice Shop Image
        run: docker compose build juice-shop