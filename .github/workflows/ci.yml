name: AI Juice Shop CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  backend:

    name: FastAPI Validation

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ai-service

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify FastAPI Imports
        env:
          PYTHONPATH: .
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JUICE_SHOP_API: https://demo.owasp-juice.shop/api/Products
        run: |
          python -c "import app.main"

      - name: Run Unit Tests
        env:
          PYTHONPATH: .
        run: |
          python -m pytest tests/unit -v

  juice-shop:

    name: Build Juice Shop

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: juice-shop

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Dependencies
        run: npm install

      - name: Build
        run: npm run build

  docker:

    name: Validate Docker

    runs-on: ubuntu-latest

    needs:
      - backend
      - juice-shop

    steps:

      - uses: actions/checkout@v4

      - name: Validate Compose
        run: docker compose config

      - name: Build AI Service
        run: docker compose build ai-service

      - name: Build Juice Shop
        run: docker compose build juice-shop