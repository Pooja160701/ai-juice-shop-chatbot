apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-service
  namespace: juice-shop

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ai-service

  template:

    metadata:
      labels:
        app: ai-service

    spec:

      containers:
        - name: ai-service

          image: ghcr.io/pooja160701/ai-service:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8000

          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-service-secret
                  key: OPENAI_API_KEY

            - name: OPENAI_MODEL
              value: "gpt-5-mini"

            - name: CHROMA_PATH
              value: "/app/chroma_db"

            - name: JUICE_SHOP_API
              value: "http://juice-shop:3000/api/Products"

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: 8000

            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 8000

            initialDelaySeconds: 20
            periodSeconds: 20