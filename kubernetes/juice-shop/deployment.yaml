apiVersion: apps/v1
kind: Deployment

metadata:
  name: juice-shop
  namespace: juice-shop

spec:

  replicas: 1

  selector:
    matchLabels:
      app: juice-shop

  template:

    metadata:
      labels:
        app: juice-shop

    spec:

      containers:

        - name: juice-shop

          image: ghcr.io/pooja160701/juice-shop:latest

          imagePullPolicy: Always

          ports:
            - containerPort: 3000

          env:

            - name: AI_SERVICE_URL
              value: "http://ai-service:8000/rest/chat"